<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>

<body>
    <main class="container py-5">
        <h1 class="mb-4">Payment Page</h1>
        <div class="row g-4 ">
            <div class="col-lg-6 customerDetails">
                <h5 class="mb-3">Shipping Adress</h5>
                <div class="card mb-4">
                    <div class="card-body">
                    </div>
                </div>
            </div>
            <div class="col-lg-6 orderSummary">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title mb-4">Order Summary</h5>
                        <div class="d-flex justify-content-between mb-3">
                            <!-- <span class="su">Subtotal</span> -->
                            <span>Subtotal</span>
                            <span class="subTotalAll">0</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span>Shipping</span>
                            <span class="shippingCharge">0</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span>Tax</span>
                            <span class="tax">0</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span>Total</span>
                            <span class="GrandTotal">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
    </main>
    <div class="row mt-4 justify-content-center">

        <div class="col-lg-6 col-md-8 mt-4">
            <div class="card">
                <div class="card-body">
                    <form>
                        <div class="form-check mb-2">
                            <input type="radio" class="form-check-input" id="upi" name="optradio" value="upi"
                                checked>
                            <label class="form-check-label" for="upi">UPI</label>
                        </div>
                        <div class="form-check mb-2">
                            <input type="radio" class="form-check-input" id="card" name="optradio" value="creditcard">
                            <label class="form-check-label" for="card">Cards</label>
                        </div>
                        <div class="form-check mb-2">
                            <input type="radio" class="form-check-input" id="cod" name="optradio" value="COD (Cash On Delivery)">
                            <label class="form-check-label" for="cod">Cash On Delivery</label>
                        </div>
                        <!-- <div class="form-check">
                            <input type="radio" class="form-check-input" disabled>
                            <label class="form-check-label">Option 3</label>
                        </div> -->
                        <button id="paymentBtn" type="submit" class="btn btn-primary w-100" disabled>Pay Now</button>
                    </form>
    
                </div>
    
    
            </div>
    
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
