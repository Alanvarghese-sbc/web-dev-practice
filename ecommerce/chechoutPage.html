<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Document</title>
</head>

<body>
    <main class="container py-5">
        <header class="d-flex mb-3 gap-5 align-items-center">
            <h1>Checkout Page</h1>
            <a href=" cartPage.html" class="btn btn-outline-primary">
                <i class="bi bi-arrow-left me-2"></i>back to cart
            </a>
        </header>
        <section class="row">
            <section class="col-lg-6 shippingInformation">
                <div>
                    <div class="container mt-3 p-4 border border-secondary-subtle rounded-3 shadow-sm">
                        <h2>Stacked form</h2>
                        <form id="checkoutForm">
                            <div class="mb-3 mt-3">
                                <label for="fullName">Full Name:</label>
                                <input type="text" class="form-control" id="fullName" placeholder="Enter Full name"
                                    name="name" required>
                            </div>
                            <div class="mb-3 mt-3">
                                <label for="email">Email:</label>
                                <input type="email" class="form-control" id="email" placeholder="Enter email"
                                    name="email" required>
                            </div>
                            <div class="mb-3 mt-3">
                                <label for="phoneNumber">Phone Number:</label>
                                <input type="tel" class="form-control" id="phoneNumber" placeholder="+91 0000000000"
                                    name="phoneNumber">
                            </div>
                            <div class="row mb-3 mt-3">
                                <div class="col-md-4 ">
                                    <label for="city">City</label>
                                    <input type="text" class="form-control" id="city" placeholder="Enter City"
                                        name="city">
                                </div>
                                <div class="col-md-4">
                                    <label for="state">State</label>
                                    <input type="text" class="form-control" id="state" placeholder="Enter State"
                                        name="state">
                                </div>
                                <div class="col-md-4">
                                    <label for="zipCode">Zip Code</label>
                                    <input type="text" inputmode="numeric" class="form-control" id="zipCode"
                                        placeholder="Enter 6-digit PIN" name="zipCode" maxlength="6"
                                        pattern="[1-9][0-9]{5}" required>
                                </div>
                            </div>
                            <div class="form-check mb-3">
                                <label class="form-check-label">
                                    <input id="terms" class="form-check-input" type="checkbox" name="termsAndConditions"> I have
                                    read and agree to the Terms and Conditions
                                </label>

                            </div>
                            <button id="saveBtn" type="submit" class="btn btn-primary" disabled>Save Details</button>
                        </form>
                    </div>
                </div>

            </section>
            <section class="col-lg-6">
                <h2>Review your Cart</h2>
                <div class="CheckOutItems">

                </div>
                <div class="card orderSummary">

                    <div class="card-body">
                        <h5 class="card-title mb-4">Order Summary</h5>
                        <div class="d-flex justify-content-between mb-3">
                            <!-- <span class="su">Subtotal</span> -->
                            <span>Subtotal</span>
                            <span class="subTotalAll">0</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span>Shipping</span>
                            <span class="shippingCharge">0</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span>Tax</span>
                            <span class="tax">0</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span>Total</span>
                            <span class="GrandTotal">0</span>
                        </div>
                        <button id="paymentBtn" class="btn btn-primary w-100" disabled>
                            Proceed to Payment section
                        </button>

                    </div>


                </div>

            </section>

        </section>

    </main>
    <script src="checkout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
